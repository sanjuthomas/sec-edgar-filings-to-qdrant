name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0) — creates git tag v{version} and publishes the image"
        required: true
        type: string

env:
  IMAGE_NAME: sec-edgar-filings-to-qdrant

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: tags
        run: |
          image="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          tags=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
            tags="${image}:v${version},${image}:${version},${image}:latest"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ref_tag="${GITHUB_REF#refs/tags/}"
            version="${ref_tag#v}"
            tags="${image}:${ref_tag},${image}:${version},${image}:latest"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            short_sha="${GITHUB_SHA::7}"
            tags="${image}:latest,${image}:sha-${short_sha}"
          else
            echo "Unsupported ref: ${GITHUB_REF}" >&2
            exit 1
          fi

          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "Publishing: ${tags}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push git tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tag="v${{ github.event.inputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; skipping tag creation."
            exit 0
          fi
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
