<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEC EDGAR Semantic Search</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --radius: 10px;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f6f9;
        --surface: #ffffff;
        --border: #d8dee9;
        --text: #1a2332;
        --muted: #5c6b82;
        --shadow: 0 8px 24px rgba(15, 20, 25, 0.08);
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    header {
      margin-bottom: 2rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .stats {
      display: flex;
      gap: 1rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      min-width: 140px;
      box-shadow: var(--shadow);
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 0.15rem;
    }

    .stat-value.ok { color: var(--success); }
    .stat-value.warn { color: var(--warning); }
    .stat-value.err { color: var(--error); }

    form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: var(--shadow);
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 88px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font: inherit;
      resize: vertical;
    }

    textarea:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    input[type="number"],
    input[type="text"],
    select {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font: inherit;
    }

    button {
      margin-top: 1.25rem;
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    #status {
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: var(--muted);
      min-height: 1.35rem;
    }

    #status.error { color: var(--error); }

    .results-header {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .result {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.15rem;
      margin-bottom: 0.85rem;
      box-shadow: var(--shadow);
    }

    .result-header {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      align-items: baseline;
      margin-bottom: 0.65rem;
      font-size: 0.85rem;
    }

    .result-rank {
      font-weight: 700;
      color: var(--accent);
    }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge.similarity {
      color: var(--success);
      border-color: color-mix(in srgb, var(--success) 40%, var(--border));
    }

    .result-meta {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 0.65rem;
    }

    .result-meta a {
      color: var(--accent);
      text-decoration: none;
    }

    .result-meta a:hover { text-decoration: underline; }

    .result-content {
      white-space: pre-wrap;
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .nav-links a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .nav-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <nav class="nav-links">
        <a href="/">Search</a>
        <a href="http://localhost:8001/">Admin</a>
      </nav>
      <h1>SEC EDGAR Semantic Search</h1>
      <p class="subtitle">Search embedded filing chunks in Qdrant to verify your data pipeline.</p>
      <div class="stats" id="stats">
        <div class="stat">
          <div class="stat-label">Filings</div>
          <div class="stat-value" id="filing-count">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Chunks</div>
          <div class="stat-value" id="chunk-count">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">BM25</div>
          <div class="stat-value" id="bm25-ready">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Embedding</div>
          <div class="stat-value" id="embedding-backend" style="font-size:1rem;">—</div>
        </div>
      </div>
    </header>

    <form id="search-form">
      <label for="query">Search term or question</label>
      <textarea id="query" name="query" placeholder="e.g. revenue growth, executive compensation, director election" required></textarea>

      <div class="row">
        <div>
          <label for="mode">Search mode</label>
          <select id="mode" name="mode">
            <option value="semantic" selected>Semantic (dense vectors)</option>
            <option value="keyword">Keyword (BM25)</option>
          </select>
        </div>
        <div>
          <label for="top-k">Number of chunks</label>
          <input type="number" id="top-k" name="top-k" value="10" min="1" max="100">
        </div>
        <div>
          <label for="ticker">Ticker (optional)</label>
          <input type="text" id="ticker" name="ticker" placeholder="e.g. AEE">
        </div>
        <div>
          <label for="form">Form (optional)</label>
          <input type="text" id="form" name="form" placeholder="e.g. 10-Q">
        </div>
      </div>

      <button type="submit" id="submit-btn">Search</button>
    </form>

    <div id="status"></div>
    <div id="results"></div>
  </div>

  <script>
    const form = document.getElementById("search-form");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");
    const submitBtn = document.getElementById("submit-btn");
    const filingCountEl = document.getElementById("filing-count");
    const chunkCountEl = document.getElementById("chunk-count");
    const bm25ReadyEl = document.getElementById("bm25-ready");
    const embeddingBackendEl = document.getElementById("embedding-backend");

    async function loadStats() {
      try {
        const res = await fetch("/api/stats");
        if (!res.ok) throw new Error("Could not load Qdrant stats");
        const data = await res.json();
        filingCountEl.textContent = data.filing_count.toLocaleString();
        chunkCountEl.textContent = data.chunk_count.toLocaleString();
        filingCountEl.className = "stat-value " + (data.filing_count > 0 ? "ok" : "warn");
        chunkCountEl.className = "stat-value " + (data.chunk_count > 0 ? "ok" : "warn");
        bm25ReadyEl.textContent = data.bm25_ready ? "Ready" : "Not ready";
        bm25ReadyEl.className = "stat-value " + (data.bm25_ready ? "ok" : "warn");
        embeddingBackendEl.textContent = data.embedding_backend === "ollama"
          ? `Ollama (${data.embedding_model})`
          : `Embedded (${data.embedding_model.split("/").pop()})`;
        embeddingBackendEl.className = "stat-value ok";
      } catch (err) {
        filingCountEl.textContent = "?";
        chunkCountEl.textContent = "?";
        bm25ReadyEl.textContent = "?";
        embeddingBackendEl.textContent = "?";
        filingCountEl.className = "stat-value err";
        chunkCountEl.className = "stat-value err";
        bm25ReadyEl.className = "stat-value err";
        embeddingBackendEl.className = "stat-value err";
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function renderResults(data) {
      if (!data.results.length) {
        resultsEl.innerHTML = '<div class="empty">No matching chunks found. Try a different query or check that filings have been processed.</div>';
        return;
      }

      const header = `<div class="results-header">Showing ${data.count} of top ${data.top_k} results for &ldquo;${escapeHtml(data.query)}&rdquo;</div>`;
      const cards = data.results.map((r, i) => {
        const meta = r.metadata || {};
        const ticker = meta.ticker || "?";
        const formType = meta.form || "?";
        const section = meta.section ? `<span>${escapeHtml(meta.section)}</span>` : "";
        const docUrl = meta.document_url
          ? `<a href="${escapeHtml(meta.document_url)}" target="_blank" rel="noopener">SEC filing</a>`
          : "";
        const company = meta.company_name ? escapeHtml(meta.company_name) : "";
        const filingDate = meta.filing_date ? escapeHtml(String(meta.filing_date)) : "";

        const similarityBadge = r.similarity != null
          ? `<span class="badge similarity">${(r.similarity * 100).toFixed(1)}% similar</span>
             <span class="badge">distance ${r.distance.toFixed(4)}</span>`
          : `<span class="badge similarity">BM25 rank ${Number(r.rank).toFixed(4)}</span>`;

        return `
          <article class="result">
            <div class="result-header">
              <span class="result-rank">#${i + 1}</span>
              <span class="badge">${escapeHtml(ticker)} ${escapeHtml(formType)}</span>
              ${similarityBadge}
            </div>
            <div class="result-meta">
              ${company ? `<span>${company}</span> · ` : ""}
              <span>${escapeHtml(r.accession_number)}</span> · chunk ${r.chunk_index}
              ${filingDate ? ` · ${filingDate}` : ""}
              ${section ? ` · ${section}` : ""}
              ${docUrl ? ` · ${docUrl}` : ""}
            </div>
            <div class="result-content">${escapeHtml(r.content.trim())}</div>
          </article>
        `;
      }).join("");

      resultsEl.innerHTML = header + cards;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const query = document.getElementById("query").value.trim();
      const topK = document.getElementById("top-k").value;
      const ticker = document.getElementById("ticker").value.trim();
      const formType = document.getElementById("form").value.trim();

      if (!query) return;

      const mode = document.getElementById("mode").value;
      submitBtn.disabled = true;
      statusEl.className = "";
      statusEl.textContent = mode === "keyword"
        ? "Searching with Qdrant BM25…"
        : "Searching… (first query may take a moment while the embedding model loads)";
      resultsEl.innerHTML = "";

      const params = new URLSearchParams({ q: query, top_k: topK, mode });
      if (ticker) params.set("ticker", ticker);
      if (formType) params.set("form", formType);

      try {
        const res = await fetch(`/api/search?${params}`);
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || "Search failed");
        }
        statusEl.textContent = "";
        renderResults(data);
      } catch (err) {
        statusEl.className = "error";
        statusEl.textContent = err.message || "Search failed";
      } finally {
        submitBtn.disabled = false;
      }
    });

    loadStats();
  </script>
</body>
</html>
