# Consumer stack for sec-edgar-filings.
#
# This compose file runs ONLY Qdrant and the edgar-etl consumer.
# Kafka is owned by sec-edgar-filings:
#   https://github.com/sanjuthomas/sec-edgar-filings
#
# Start the producer stack first, then this one:
#   cd sec-edgar-filings && docker compose up -d
#   cd sec-edgar-filings-to-qdrant && docker compose up -d --build

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: edgar-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /Volumes/Transcend/qdrant-data:/qdrant/storage
    restart: unless-stopped
    networks:
      - sec-edgar
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  edgar-etl:
    build: .
    container_name: edgar-etl
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: filing_chunks
      EDGAR_DATA_DIR: ${EDGAR_HOST_PATH:-/Volumes/Transcend/edgar}
      ALLOWED_FORMS: 10-K,10-Q,10-K/A,10-Q/A
      # Read-only consumer — Kafka runs in sec-edgar-filings compose.
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: filings
      KAFKA_GROUP_ID: edgar-etl
      KAFKA_AUTO_OFFSET_RESET: earliest
    volumes:
      # Filing .htm content is read from this host path (same as sec-edgar-filings).
      - ${EDGAR_HOST_PATH:-/Volumes/Transcend/edgar}:${EDGAR_HOST_PATH:-/Volumes/Transcend/edgar}:ro
    restart: unless-stopped
    networks:
      - sec-edgar

networks:
  sec-edgar:
    external: true
    name: ${SEC_EDGAR_DOCKER_NETWORK:-sec-edgar-filings_default}
